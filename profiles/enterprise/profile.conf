# profiles/enterprise/profile.conf
# collab-runtime — Enterprise profile
# Target: 8+ vCPU, 32+ GB RAM (e.g. t3.2xlarge, n2-standard-8, D8s_v5)
# Suitable for: high-traffic production, large teams, data-intensive workloads

PROFILE_NAME="enterprise"
PROFILE_DESCRIPTION="Enterprise VM — 8+ vCPU / 32+ GB RAM"

# ── Component versions ────────────────────────────────────────────────────────
PG_VERSION="17"
NODE_VERSION="24"

# ── PostgreSQL tuning (aggressive — assumes dedicated DB workload) ────────────
PG_SHARED_BUFFERS="8GB"
PG_EFFECTIVE_CACHE_SIZE="24GB"
PG_WORK_MEM="64MB"
PG_MAINTENANCE_WORK_MEM="2GB"
PG_MAX_CONNECTIONS="300"

# ── NGINX worker config ────────────────────────────────────────────────────────
NGINX_WORKER_PROCESSES="auto"
NGINX_WORKER_CONNECTIONS="4096"

# ── Redis config ───────────────────────────────────────────────────────────────
REDIS_MAXMEMORY="4gb"
REDIS_MAXMEMORY_POLICY="allkeys-lru"
