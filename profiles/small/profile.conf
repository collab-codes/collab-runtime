# profiles/small/profile.conf
# collab-runtime — Small profile
# Target: 1–2 vCPU, 1–2 GB RAM (e.g. t3.micro, e2-micro, B1s)
# Suitable for: development environments, low-traffic staging servers

PROFILE_NAME="small"
PROFILE_DESCRIPTION="Small VM — 1-2 vCPU / 1-2 GB RAM"

# ── Component versions ────────────────────────────────────────────────────────
PG_VERSION="17"
NODE_VERSION="24"

# ── PostgreSQL tuning (conservative — low shared_buffers for small RAM) ───────
PG_SHARED_BUFFERS="128MB"
PG_EFFECTIVE_CACHE_SIZE="256MB"
PG_WORK_MEM="4MB"
PG_MAINTENANCE_WORK_MEM="32MB"
PG_MAX_CONNECTIONS="50"

# ── NGINX worker config ────────────────────────────────────────────────────────
NGINX_WORKER_PROCESSES="1"
NGINX_WORKER_CONNECTIONS="512"

# ── Redis config ───────────────────────────────────────────────────────────────
REDIS_MAXMEMORY="128mb"
REDIS_MAXMEMORY_POLICY="allkeys-lru"
