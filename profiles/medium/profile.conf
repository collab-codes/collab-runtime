# profiles/medium/profile.conf
# collab-runtime — Medium profile (default)
# Target: 2–4 vCPU, 4–8 GB RAM (e.g. t3.medium, e2-standard-2, B2ms)
# Suitable for: production workloads, small-to-medium teams

PROFILE_NAME="medium"
PROFILE_DESCRIPTION="Medium VM — 2-4 vCPU / 4-8 GB RAM (default)"

# ── Component versions ────────────────────────────────────────────────────────
PG_VERSION="17"
NODE_VERSION="24"

# ── PostgreSQL tuning ─────────────────────────────────────────────────────────
PG_SHARED_BUFFERS="1GB"
PG_EFFECTIVE_CACHE_SIZE="3GB"
PG_WORK_MEM="16MB"
PG_MAINTENANCE_WORK_MEM="256MB"
PG_MAX_CONNECTIONS="100"

# ── NGINX worker config ────────────────────────────────────────────────────────
NGINX_WORKER_PROCESSES="auto"
NGINX_WORKER_CONNECTIONS="1024"

# ── Redis config ───────────────────────────────────────────────────────────────
REDIS_MAXMEMORY="512mb"
REDIS_MAXMEMORY_POLICY="allkeys-lru"
